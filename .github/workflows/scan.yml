name: PKScreener Auto Scan

on:
  schedule:
    - cron: '0 3 * * 1-5'
    - cron: '15 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install yfinance --quiet
          pip install pkscreener --quiet --no-deps
          pip install requests pandas numpy ta --quiet

      - name: Patch PKScreener
        run: |
          python - <<'EOF'
          import site, os
          sp = site.getsitepackages()[0]
          mf = os.path.join(sp, "pkscreener", "classes", "MenuOptions.py")
          if os.path.exists(mf):
              with open(mf, "r") as f: c = f.read()
              c = c.replace(
                  "self.is_subscription_enabled = bool(int(PKEnvironment().SUBSCRIPTION_ENABLED))",
                  "self.is_subscription_enabled = False")
              with open(mf, "w") as f: f.write(c)
              print("MenuOptions patched")
          cf = os.path.join(sp, "pkscreener", "pkscreenercli.py")
          if os.path.exists(cf):
              with open(cf, "r") as f: c = f.read()
              c = c.replace(
                  "if not PKUserRegistration.login():",
                  "if False:  # bypassed")
              with open(cf, "w") as f: f.write(c)
              print("Login bypass applied")
          EOF

      - name: Run PKScreener scans
        run: python scan.py

      - name: Inject data into dashboard
        run: python inject.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "PKScreener Bot"
          git config user.email "pkscreener-bot@github-actions"
          git add data.json dashboard.html
          git diff --staged --quiet || git commit -m "Auto scan: $(date +'%d %b %Y %H:%M IST')"
          git pull --rebase
          git push
